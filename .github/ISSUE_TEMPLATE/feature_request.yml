name: Feature request
description: Suggest an improvement to the harness
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior and any alternatives considered.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
