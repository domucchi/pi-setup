name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please remove credentials, private URLs, and other sensitive data from logs.
  - type: input
    id: pi-version
    attributes:
      label: pi version
      placeholder: Output of `pi --version`
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: Output of `node --version`
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows / WSL
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: Provide the smallest reliable reproduction.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
